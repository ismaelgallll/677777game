<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>67 Escape - Part 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial;background:#0d1022;color:#fff}
#menu{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(#11173b,#05070f)}
#menu h1{font-size:64px;color:#58a6ff;margin-bottom:16px}
#menu p{margin-bottom:20px;font-size:20px}
button{padding:16px 30px;font-size:22px;border:none;border-radius:10px;background:#2f82ff;color:#fff;cursor:pointer}
#game{display:none;position:fixed;inset:0;background:#141b33}
#hud{position:absolute;top:12px;left:12px;background:#0008;padding:10px 14px;border-radius:10px}
#world{position:absolute;width:4000px;height:4000px;
background:
linear-gradient(#222 2px,transparent 2px),
linear-gradient(90deg,#222 2px,transparent 2px);
background-size:80px 80px;}
#player{position:absolute;left:200px;top:200px;width:34px;height:34px;background:#4cff66;border-radius:6px}
#exit{position:absolute;left:3600px;top:3600px;width:60px;height:60px;background:#2f82ff;border-radius:10px}
</style>
</head>
<body>
<div id="menu">
<h1>67 ESCAPE</h1>
<p>Chromebook Edition</p>
<button id="playButton">PLAY</button>
<p style="margin-top:20px;color:#aaa;">Part 1 - Engine Base</p>
</div>

<div id="game">
<div id="hud">Keys: <span id="keyCount">0</span>/67</div>
<div id="world">
<div id="player"></div>
<div id="exit"></div>
</div>
</div>

<script>
const menu=document.getElementById("menu");
const game=document.getElementById("game");
document.getElementById("playButton").addEventListener("click",()=>{
    menu.style.display="none";
    game.style.display="block";
    alert("Part 1 loaded! Part 2 will add movement, camera, and gameplay.");
});
</script>
</body>
</html>
